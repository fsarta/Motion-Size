<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: () => originalFetch,
          set: (v) => { console.warn("Ignoring window.fetch assignment", v); },
          configurable: true
        });
        
        const originalParse = JSON.parse;
        JSON.parse = function(text, reviver) {
            if (text === "undefined" || text === undefined) {
                return null;
            }
            return originalParse.apply(this, arguments);
        };
      } catch (e) { console.error("Could not redefine fetch/parse", e); }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ServoSoft Clone</title>
    <link rel="stylesheet" href="/index.css">
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden; /* Prevent body scroll for desktop app feel */
        user-select: none;
      }
      /* Custom scrollbar for a native app feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: #c1c1c1; 
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a8a8a8; 
      }
    </style>
</head>

</body>
</html>
