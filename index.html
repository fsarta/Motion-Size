<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ServoSoft Clone</title>
    <link rel="stylesheet" href="/index.css">
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden; /* Prevent body scroll for desktop app feel */
        user-select: none;
      }
      /* Custom scrollbar for a native app feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: #c1c1c1; 
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a8a8a8; 
      }
    </style>
</head>
  <body class="bg-win-bg text-slate-800 h-screen w-screen flex flex-col">
    <div id="root" class="h-full w-full flex flex-col"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
